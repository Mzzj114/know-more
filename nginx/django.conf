upstream django {
    server unix:///app/know_more.sock;
}

server {
    listen      80;
    server_name localhost;
    charset     utf-8;

    # Max upload size
    client_max_body_size 75M;

    # Django static files
    location /static {
        alias /app/staticfiles;
    }

    # Proxy all non-static requests to Django
    location / {
        uwsgi_pass  django;
        include     /etc/nginx/uwsgi_params;
    }
}
