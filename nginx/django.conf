upstream django {
    server unix:///app/know_more.sock;
}

server {
    listen      80;
    server_name promptforgood.org;
    return      301 https://$host$request_uri;
}

server {
    listen      443 ssl;
    server_name promptforgood.org;
    charset     utf-8;

    ssl_certificate /etc/ssl/know-more/promptforgood.org.pem;
    ssl_certificate_key /etc/ssl/know-more/promptforgood.org.key;

    # Max upload size
    client_max_body_size 75M;

    # Django static files
    location /static {
        alias /app/staticfiles;

        # CDN
        expires 30d;
        add_header Cache-Control "public";
    }

    # Proxy all non-static requests to Django
    location / {
        uwsgi_pass  django;
        include     /etc/nginx/uwsgi_params;
    }

    # Sitemap - handled by Django
    location = /sitemap.xml {
        uwsgi_pass  django;
        include     /etc/nginx/uwsgi_params;
    }
}
