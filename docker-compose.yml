services:
  db:
    image: mysql:8.0
    restart: always
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      - MYSQL_DATABASE=know_more
      - MYSQL_ROOT_PASSWORD=root_password_change_me
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  web:
    build: .
    restart: always
    volumes:
      - static_volume:/app/staticfiles
      - uwsgi_sock:/app
    env_file:
      - production.env
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DATABASE_URL=mysql://root:root_password_change_me@db:3306/know_more
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/django.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - uwsgi_sock:/app:ro
    depends_on:
      - web

volumes:
  mysql_data:
  static_volume:
  uwsgi_sock:
