services:
  db:
    image: mysql:8.0
    restart: always
    volumes:
      - mysql_data:/var/lib/mysql
    env_file:
      - env/db.env
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  web:
    build: .
    restart: always
    volumes:
      - static_volume:/app/staticfiles
      - uwsgi_sock:/app
    env_file:
      - env/production.env
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/django.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - uwsgi_sock:/app:ro
      - /etc/ssl/know-more:/etc/ssl/know-more:ro
    depends_on:
      - web

volumes:
  mysql_data:
  static_volume:
  uwsgi_sock:
